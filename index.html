<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🙏 🪈 राधा राधा Insurance 🦚 🙏</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --main: #1a237e; --gold: #ffd700; --orange: #ff6d00; --bg: #f4f7fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; }
        .sidebar { width: 260px; background: white; height: 100vh; position: fixed; border-right: 3px solid var(--main); z-index: 10; }
        .main { margin-left: 260px; flex: 1; padding: 25px; min-height: 100vh; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; border-top: 5px solid var(--main); }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 8px; width: 100%; box-sizing: border-box; font-size: 14px; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        .btn-save { background: linear-gradient(to right, #1a237e, #3949ab); width: 100%; margin-top: 15px; font-size: 16px; }
        .search-bar { width: 100%; padding: 12px; margin-bottom: 20px; border: 2px solid var(--main); border-radius: 10px; font-size: 16px; outline: none; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
        th { background: var(--main); color: white; padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        #login-screen { position: fixed; inset: 0; background: var(--main); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .nav-item { padding: 15px 20px; cursor: pointer; border-bottom: 1px solid #f1f1f1; display: flex; align-items: center; color: #333; }
        .nav-item:hover { background: #e8eaf6; }
        .hidden { display: none !important; }
        .header-box { text-align: center; padding: 20px; border-bottom: 3px solid var(--gold); background: #fff; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="card" style="width: 350px; text-align: center;">
        <h1 style="color: var(--main); margin:0;">🙏 🪈 राधा राधा 🦚 🙏</h1>
        <p>Insurance Management Portal</p>
        <input type="email" id="l-email" placeholder="Email" style="margin-bottom:10px;">
        <input type="password" id="l-pass" placeholder="Password" style="margin-bottom:20px;">
        <button onclick="login()" class="btn" style="background: var(--orange); width:100%">Login</button>
    </div>
</div>

<div class="sidebar hidden" id="sidebar">
    <div class="header-box">
        <h2 style="margin:0; color:var(--main);">🙏 राधा राधा</h2>
        <div style="font-size: 18px;">🪈 🦚</div>
    </div>
    <div class="nav-item" onclick="showP('dash')"><i class="fas fa-home"></i> Dashboard</div>
    <div class="nav-item" onclick="showP('entry')"><i class="fas fa-plus-circle"></i> New Entry / Edit</div>
    <div class="nav-item" onclick="showP('list')"><i class="fas fa-database"></i> Database</div>
    <div class="nav-item" onclick="firebase.auth().signOut().then(()=>location.reload())" style="color:red; margin-top:30px;"><i class="fas fa-power-off"></i> Logout</div>
</div>

<div class="main hidden" id="main-ui">
    
    <div id="p-dash" class="page">
        <div class="grid-3">
            <div class="card"><h4>Policies</h4><h2 id="st-count">0</h2></div>
            <div class="card"><h4>Net Premium</h4><h2 id="st-prem" style="color:green">₹0</h2></div>
            <div class="card"><h4>Pending</h4><h2 id="st-pend" style="color:red">₹0</h2></div>
        </div>
    </div>

    <div id="p-entry" class="page hidden">
        <div class="card">
            <h3 id="form-title">📝 Policy Entry</h3>
            <input type="hidden" id="f-id">
            <div class="grid-3">
                <input type="date" id="f-date">
                <input type="text" id="f-rm" placeholder="RM Name (Optional)">
                <input type="text" id="f-agent" placeholder="Agent Name (Optional)">
                <input type="text" id="f-client" placeholder="Customer Name">
                <input type="text" id="f-reg" placeholder="Vehicle Reg No.">
                <input type="text" id="f-polno" placeholder="Policy No.">
                <input type="text" id="f-comp" placeholder="Company">
                <input type="number" id="f-premium" placeholder="Premium Amount" oninput="calc()">
                <input type="number" id="f-rcvd" placeholder="Received Amount" oninput="calc()">
                <input type="number" id="f-bal" placeholder="Balance" readonly style="background:#f9f9f9; color:red;">
            </div>
            <button onclick="saveData()" class="btn btn-save" id="save-btn">💾 Save Record</button>
        </div>
    </div>

    <div id="p-list" class="page hidden">
        <input type="text" id="search" class="search-bar" placeholder="🔍 Search by Name, Policy or Vehicle No..." onkeyup="search()">
        <button onclick="exportExcel()" class="btn" style="background:#2e7d32; margin-bottom:15px;">Excel Download</button>
        <div class="card" style="padding:0; overflow-x:auto;">
            <table>
                <thead>
                    <tr><th>Date</th><th>Customer</th><th>Vehicle</th><th>Premium</th><th>Pending</th><th>RM</th><th>Action</th></tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCb4Bd4pGSpJR2SOb6UGEORXb0-O_Ju_M0",
        authDomain: "radhe-radhe-insurance-4d1f8.firebaseapp.com",
        projectId: "radhe-radhe-insurance-4d1f8",
        storageBucket: "radhe-radhe-insurance-4d1f8.firebasestorage.app",
        messagingSenderId: "1025474609753",
        appId: "1:1025474609753:web:24b3156cfff474d2bfe748"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function login() {
        firebase.auth().signInWithEmailAndPassword(document.getElementById('l-email').value, document.getElementById('l-pass').value)
        .catch(err => alert("Error: " + err.message));
    }

    firebase.auth().onAuthStateChanged(user => {
        if(user) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('sidebar').classList.remove('hidden');
            document.getElementById('main-ui').classList.remove('hidden');
            loadData();
        }
    });

    function calc() {
        let p = Number(document.getElementById('f-premium').value) || 0;
        let r = Number(document.getElementById('f-rcvd').value) || 0;
        document.getElementById('f-bal').value = p - r;
    }

    function saveData() {
        const id = document.getElementById('f-id').value;
        const data = {
            date: document.getElementById('f-date').value,
            rm: document.getElementById('f-rm').value || "N/A",
            agent: document.getElementById('f-agent').value || "N/A",
            client: document.getElementById('f-client').value || "Unknown",
            reg: document.getElementById('f-reg').value || "N/A",
            polno: document.getElementById('f-polno').value || "N/A",
            comp: document.getElementById('f-comp').value || "N/A",
            premium: Number(document.getElementById('f-premium').value),
            rcvd: Number(document.getElementById('f-rcvd').value),
            bal: Number(document.getElementById('f-bal').value),
            ts: firebase.firestore.FieldValue.serverTimestamp()
        };

        const col = db.collection("mis_records");
        const promise = id ? col.doc(id).update(data) : col.add(data);
        promise.then(() => { alert("Saved!"); reset(); showP('list'); });
    }

    let allData = [];
    function loadData() {
        db.collection("mis_records").orderBy("date", "desc").onSnapshot(snap => {
            let h = ""; let tP = 0; let tB = 0; allData = [];
            snap.forEach(doc => {
                const d = doc.data(); d.id = doc.id; allData.push(d);
                tP += d.premium; tB += d.bal;
                h += `<tr><td>${d.date}</td><td><b>${d.client}</b></td><td>${d.reg}</td><td>₹${d.premium}</td><td style="color:red">₹${d.bal}</td><td>${d.rm}</td><td><i class='fas fa-edit' onclick="edit('${d.id}')" style='color:blue; cursor:pointer'></i></td></tr>`;
            });
            document.getElementById('table-body').innerHTML = h;
            document.getElementById('st-count').innerText = snap.size;
            document.getElementById('st-prem').innerText = "₹" + tP.toLocaleString();
            document.getElementById('st-pend').innerText = "₹" + tB.toLocaleString();
        });
    }

    function search() {
        let val = document.getElementById('search').value.toLowerCase();
        let filtered = allData.filter(d => d.client.toLowerCase().includes(val) || d.reg.toLowerCase().includes(val) || d.polno.toLowerCase().includes(val));
        let h = "";
        filtered.forEach(d => {
            h += `<tr><td>${d.date}</td><td><b>${d.client}</b></td><td>${d.reg}</td><td>₹${d.premium}</td><td style="color:red">₹${d.bal}</td><td>${d.rm}</td><td><i class='fas fa-edit' onclick="edit('${d.id}')" style='color:blue; cursor:pointer'></i></td></tr>`;
        });
        document.getElementById('table-body').innerHTML = h;
    }

    function edit(id) {
        let d = allData.find(x => x.id === id);
        document.getElementById('f-id').value = id;
        document.getElementById('f-date').value = d.date;
        document.getElementById('f-rm').value = d.rm;
        document.getElementById('f-agent').value = d.agent;
        document.getElementById('f-client').value = d.client;
        document.getElementById('f-reg').value = d.reg;
        document.getElementById('f-premium').value = d.premium;
        document.getElementById('f-rcvd').value = d.rcvd;
        document.getElementById('f-bal').value = d.bal;
        showP('entry');
    }

    function reset() { document.querySelectorAll('input').forEach(i => i.value = ""); }
    function showP(p) { document.querySelectorAll('.page').forEach(e => e.classList.add('hidden')); document.getElementById('p-'+p).classList.remove('hidden'); }
</script>
</body>
</html>
