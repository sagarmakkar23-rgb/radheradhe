<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🙏 🪈 राधा राधा Insurance ERP 🦚 🙏</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #0f172a; --accent: #f59e0b; --bg: #f8fafc; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; display: flex; font-size: 13px; }
        .sidebar { width: 260px; background: var(--primary); height: 100vh; position: fixed; color: white; overflow-y: auto; }
        .nav-item { padding: 15px 20px; display: flex; align-items: center; cursor: pointer; transition: 0.3s; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .nav-item:hover { background: rgba(255,255,255,0.1); color: var(--accent); }
        .main { margin-left: 260px; flex: 1; padding: 25px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 20px; border-top: 4px solid var(--accent); }
        .form-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-weight: 600; margin-bottom: 5px; color: #475569; font-size: 11px; text-transform: uppercase; }
        input, select { padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; outline: none; transition: 0.3s; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; color: white; transition: 0.2s; }
        .btn-save { background: var(--accent); color: var(--primary); width: 100%; margin-top: 20px; font-size: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #f1f5f9; color: #475569; padding: 12px; text-align: left; font-size: 11px; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; }
        .hidden { display: none; }
        #login-screen { position: fixed; inset: 0; background: var(--primary); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .error-msg { color: #ef4444; font-size: 12px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="card" style="width: 320px; text-align: center;">
        <h2 style="color:var(--primary)">🙏 राधा राधा 🙏</h2>
        <p>Insurance Management ERP</p>
        <input type="email" id="l-email" placeholder="Email" style="margin-bottom:10px; width:100%">
        <input type="password" id="l-pass" placeholder="Password" style="margin-bottom:10px; width:100%">
        <button onclick="login()" class="btn-save" style="margin:0">Login</button>
        <div id="login-err" class="error-msg"></div>
    </div>
</div>

<div class="sidebar hidden" id="sidebar">
    <div style="padding:25px; text-align:center; border-bottom:1px solid #334155;">
        <h2 style="margin:0; color:var(--accent);">🪈 राधा राधा 🦚</h2>
    </div>
    <div class="nav-item" onclick="showP('dash')"><i class="fas fa-chart-pie"></i>&nbsp; DASHBOARD</div>
    <div class="nav-item" onclick="showP('entry')"><i class="fas fa-plus-square"></i>&nbsp; NEW POLICY ENTRY</div>
    <div class="nav-item" onclick="showP('list')"><i class="fas fa-table"></i>&nbsp; POLICY DATABASE</div>
    <div class="nav-item" style="margin-top:50px; color:#f87171" onclick="firebase.auth().signOut().then(()=>location.reload())">
        <i class="fas fa-power-off"></i>&nbsp; LOGOUT
    </div>
</div>

<div class="main hidden" id="main-ui">
    <div id="p-dash" class="page">
        <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:20px;">
            <div class="card"><h3>Total Net Business</h3><h2 id="st-net" style="color:green">₹0</h2></div>
            <div class="card"><h3>Total Received</h3><h2 id="st-rcv" style="color:blue">₹0</h2></div>
            <div class="card"><h3>Total Pending</h3><h2 id="st-bal" style="color:red">₹0</h2></div>
        </div>
    </div>

    <div id="p-entry" class="page hidden">
        <div class="card">
            <h3>📝 Policy Entry Form</h3>
            <input type="hidden" id="f-id">
            <div class="form-grid">
                <div class="input-group"><label>Date</label><input type="date" id="f-date"></div>
                <div class="input-group"><label>RM Name</label><input type="text" id="f-rm"></div>
                <div class="input-group"><label>Customer Name</label><input type="text" id="f-client"></div>
                <div class="input-group"><label>Vehicle No</label><input type="text" id="f-reg"></div>
                <div class="input-group"><label>Policy No</label><input type="text" id="f-polno"></div>
                <div class="input-group"><label>OD Prem</label><input type="number" id="f-od" oninput="calc()"></div>
                <div class="input-group"><label>TP Prem</label><input type="number" id="f-tp" oninput="calc()"></div>
                <div class="input-group"><label>Net Prem</label><input type="number" id="f-net" readonly></div>
                <div class="input-group"><label>Received</label><input type="number" id="f-rcvd" oninput="calc()"></div>
                <div class="input-group"><label>Balance</label><input type="number" id="f-bal" readonly style="color:red"></div>
            </div>
            <button onclick="saveData()" class="btn btn-save">💾 Save Policy</button>
        </div>
    </div>

    <div id="p-list" class="page hidden">
        <div class="card">
            <input type="text" id="search" placeholder="Search Customer..." onkeyup="search()" style="width:100%; margin-bottom:15px;">
            <table>
                <thead>
                    <tr><th>Date</th><th>Client</th><th>Vehicle</th><th>Net Prem</th><th>Pending</th><th>RM</th><th>Actions</th></tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCb4Bd4pGSpJR2SOb6UGEORXb0-O_Ju_M0",
        authDomain: "radhe-radhe-insurance-4d1f8.firebaseapp.com",
        projectId: "radhe-radhe-insurance-4d1f8",
        storageBucket: "radhe-radhe-insurance-4d1f8.firebasestorage.app",
        messagingSenderId: "1025474609753",
        appId: "1:1025474609753:web:24b3156cfff474d2bfe748"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function login() {
        const email = document.getElementById('l-email').value;
        const pass = document.getElementById('l-pass').value;
        firebase.auth().signInWithEmailAndPassword(email, pass)
        .catch(e => {
            document.getElementById('login-err').innerText = "Login Failed: " + e.message;
        });
    }

    firebase.auth().onAuthStateChanged(user => {
        if(user) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('sidebar').classList.remove('hidden');
            document.getElementById('main-ui').classList.remove('hidden');
            loadData();
        }
    });

    function calc() {
        let od = Number(document.getElementById('f-od').value) || 0;
        let tp = Number(document.getElementById('f-tp').value) || 0;
        let rcv = Number(document.getElementById('f-rcvd').value) || 0;
        document.getElementById('f-net').value = od + tp;
        document.getElementById('f-bal').value = (od + tp) - rcv;
    }

    function saveData() {
        const id = document.getElementById('f-id').value;
        const data = {
            date: document.getElementById('f-date').value,
            rm: document.getElementById('f-rm').value || "N/A",
            client: document.getElementById('f-client').value,
            reg: document.getElementById('f-reg').value,
            polno: document.getElementById('f-polno').value,
            net: Number(document.getElementById('f-net').value),
            rcvd: Number(document.getElementById('f-rcvd').value),
            bal: Number(document.getElementById('f-bal').value),
            ts: firebase.firestore.FieldValue.serverTimestamp()
        };
        const col = db.collection("erp_records");
        (id ? col.doc(id).update(data) : col.add(data)).then(() => {
            alert("Success!"); reset(); showP('list');
        });
    }

    let allData = [];
    async function loadData() {
        // Fetching from both old and new collections to merge data
        const oldSnap = await db.collection("mis_records").get();
        const newSnap = await db.collection("erp_records").orderBy("date", "desc").get();
        
        let combined = [];
        oldSnap.forEach(doc => { combined.push({...doc.data(), id: doc.id}); });
        newSnap.forEach(doc => { combined.push({...doc.data(), id: doc.id}); });
        
        allData = combined;
        renderTable(allData);
    }

    function renderTable(data) {
        let h = ""; let tNet = 0; let tRcv = 0; let tBal = 0;
        data.forEach(d => {
            tNet += (d.net || d.premium || 0);
            tRcv += (d.rcvd || 0);
            tBal += (d.bal || 0);
            h += `<tr><td>${d.date}</td><td><b>${d.client}</b></td><td>${d.reg}</td><td>₹${d.net || d.premium}</td><td style="color:red">₹${d.bal}</td><td>${d.rm}</td><td><button onclick="edit('${d.id}')">Edit</button></td></tr>`;
        });
        document.getElementById('table-body').innerHTML = h;
        document.getElementById('st-net').innerText = "₹" + tNet.toLocaleString();
        document.getElementById('st-rcv').innerText = "₹" + tRcv.toLocaleString();
        document.getElementById('st-bal').innerText = "₹" + tBal.toLocaleString();
    }

    function showP(p) { document.querySelectorAll('.page').forEach(e => e.classList.add('hidden')); document.getElementById('p-'+p).classList.remove('hidden'); }
    function reset() { document.querySelectorAll('input').forEach(i => i.value = ""); }
    function search() {
        let v = document.getElementById('search').value.toLowerCase();
        renderTable(allData.filter(d => d.client.toLowerCase().includes(v) || d.reg.toLowerCase().includes(v)));
    }
</script>
</body>
</html>
