<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🙏 🪈 राधा राधा Insurance ERP 🦚 🙏</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #0f172a; --accent: #f59e0b; --bg: #f8fafc; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; display: flex; font-size: 13px; }
        .sidebar { width: 260px; background: var(--primary); height: 100vh; position: fixed; color: white; overflow-y: auto; }
        .nav-item { padding: 15px 20px; display: flex; align-items: center; cursor: pointer; transition: 0.3s; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); color: var(--accent); }
        .main { margin-left: 260px; flex: 1; padding: 25px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 20px; border-top: 4px solid var(--accent); }
        .form-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-weight: 600; margin-bottom: 5px; color: #475569; font-size: 11px; text-transform: uppercase; }
        input, select { padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; outline: none; }
        .btn { padding: 8px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; color: white; }
        .btn-save { background: var(--accent); color: var(--primary); width: 100%; margin-top: 20px; font-size: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th { background: #f1f5f9; color: #475569; padding: 12px; text-align: left; font-size: 11px; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; }
        .hidden { display: none; }
        #login-screen { position: fixed; inset: 0; background: var(--primary); z-index: 9999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="card" style="width: 320px; text-align: center; border-top: 5px solid var(--accent);">
        <h2 style="color:var(--primary); margin:0;">🙏 राधा राधा 🙏</h2>
        <p style="color: #64748b; font-size: 12px;">Premium Insurance ERP</p>
        <input type="email" id="l-email" placeholder="Email" style="margin-bottom:10px; width:100%">
        <input type="password" id="l-pass" placeholder="Password" style="margin-bottom:20px; width:100%">
        <button onclick="login()" class="btn btn-save" style="margin:0">Login to Dashboard</button>
    </div>
</div>

<div class="sidebar hidden" id="sidebar">
    <div style="padding:25px; text-align:center; border-bottom:1px solid #334155;">
        <h2 style="margin:0; color:var(--accent);">🪈 राधा राधा 🦚</h2>
    </div>
    <div class="nav-item active" onclick="showP('dash')"><i class="fas fa-chart-line"></i>&nbsp; Dashboard</div>
    <div class="nav-item" onclick="showP('entry')"><i class="fas fa-file-signature"></i>&nbsp; New MIS Entry</div>
    <div class="nav-item" onclick="showP('list')"><i class="fas fa-database"></i>&nbsp; Database Records</div>
    <div class="nav-item" style="margin-top:50px; color:#f87171" onclick="firebase.auth().signOut().then(()=>location.reload())">
        <i class="fas fa-power-off"></i>&nbsp; Sign Out
    </div>
</div>

<div class="main hidden" id="main-ui">
    <div id="p-dash" class="page">
        <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:20px; margin-bottom: 20px;">
            <div class="card"><h3>Total Net Business</h3><h2 id="st-net" style="color:green">₹0</h2></div>
            <div class="card"><h3>Total Received</h3><h2 id="st-rcv" style="color:blue">₹0</h2></div>
            <div class="card"><h3>Total Outstanding</h3><h2 id="st-bal" style="color:red">₹0</h2></div>
        </div>
        <div class="card">
            <h3>RM Wise Performance</h3>
            <div id="rm-stats-grid" style="display: flex; flex-wrap: wrap; gap: 10px;"></div>
        </div>
    </div>

    <div id="p-entry" class="page hidden">
        <div class="card">
            <h3 id="form-title">📝 Add/Edit Policy Record</h3>
            <input type="hidden" id="f-id">
            <div class="form-grid">
                <div class="input-group"><label>Date</label><input type="date" id="f-date"></div>
                <div class="input-group"><label>RM Name</label><input type="text" id="f-rm"></div>
                <div class="input-group"><label>Agent Name</label><input type="text" id="f-agent"></div>
                <div class="input-group"><label>Customer Name</label><input type="text" id="f-client"></div>
                <div class="input-group"><label>Vehicle Reg. No</label><input type="text" id="f-reg"></div>
                <div class="input-group"><label>Insurance Company</label><input type="text" id="f-comp"></div>
                <div class="input-group"><label>OD Premium</label><input type="number" id="f-od" oninput="calc()"></div>
                <div class="input-group"><label>TP Premium</label><input type="number" id="f-tp" oninput="calc()"></div>
                <div class="input-group"><label>Total Net Premium</label><input type="number" id="f-net" readonly style="background:#f1f5f9"></div>
                <div class="input-group"><label>Payment Received</label><input type="number" id="f-rcvd" oninput="calc()"></div>
                <div class="input-group"><label>Balance Pending</label><input type="number" id="f-bal" readonly style="color:red; background:#fef2f2"></div>
            </div>
            <button onclick="saveData()" class="btn btn-save" id="save-btn">💾 Save Entry to Cloud</button>
        </div>
    </div>

    <div id="p-list" class="page hidden">
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <input type="text" id="search" placeholder="🔍 Search Customer, Vehicle or RM..." onkeyup="search()" style="width:400px; padding: 12px;">
                <button onclick="exportExcel()" class="btn" style="background:#22c55e"><i class="fas fa-file-excel"></i> Export Excel</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Date</th><th>Customer</th><th>Vehicle No</th><th>Net Premium</th><th>Balance</th><th>RM</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCb4Bd4pGSpJR2SOb6UGEORXb0-O_Ju_M0",
        authDomain: "radhe-radhe-insurance-4d1f8.firebaseapp.com",
        projectId: "radhe-radhe-insurance-4d1f8",
        storageBucket: "radhe-radhe-insurance-4d1f8.firebasestorage.app",
        messagingSenderId: "1025474609753",
        appId: "1:1025474609753:web:24b3156cfff474d2bfe748"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function login() {
        const e = document.getElementById('l-email').value;
        const p = document.getElementById('l-pass').value;
        firebase.auth().signInWithEmailAndPassword(e, p).catch(err => alert("Galti: " + err.message));
    }

    firebase.auth().onAuthStateChanged(user => {
        if(user) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('sidebar').classList.remove('hidden');
            document.getElementById('main-ui').classList.remove('hidden');
            loadData();
        }
    });

    function calc() {
        let od = Number(document.getElementById('f-od').value) || 0;
        let tp = Number(document.getElementById('f-tp').value) || 0;
        let rcv = Number(document.getElementById('f-rcvd').value) || 0;
        let net = od + tp;
        document.getElementById('f-net').value = net;
        document.getElementById('f-bal').value = net - rcv;
    }

    function saveData() {
        const id = document.getElementById('f-id').value;
        const data = {
            date: document.getElementById('f-date').value,
            rm: document.getElementById('f-rm').value || "Self",
            agent: document.getElementById('f-agent').value || "None",
            client: document.getElementById('f-client').value,
            reg: document.getElementById('f-reg').value,
            comp: document.getElementById('f-comp').value,
            od: Number(document.getElementById('f-od').value) || 0,
            tp: Number(document.getElementById('f-tp').value) || 0,
            net: Number(document.getElementById('f-net').value),
            rcvd: Number(document.getElementById('f-rcvd').value),
            bal: Number(document.getElementById('f-bal').value),
            ts: firebase.firestore.FieldValue.serverTimestamp()
        };

        if(!data.client || !data.date) return alert("Date aur Customer name zaroori hai!");

        const col = db.collection("erp_records");
        (id ? col.doc(id).update(data) : col.add(data)).then(() => {
            alert("🙏 Data Saved!");
            reset(); showP('list');
        });
    }

    let allData = [];
    async function loadData() {
        // Merging old and new data structure
        const snap = await db.collection("erp_records").orderBy("date", "desc").get();
        const oldSnap = await db.collection("mis_records").get();
        
        let merged = [];
        snap.forEach(doc => { merged.push({ ...doc.data(), id: doc.id }); });
        oldSnap.forEach(doc => { 
            let d = doc.data();
            merged.push({ ...d, net: (d.premium || d.net || 0), id: doc.id }); 
        });

        allData = merged;
        updateUI(allData);
    }

    function updateUI(data) {
        let h = ""; let tNet = 0; let tRcv = 0; let tBal = 0; let rmM = {};
        data.forEach(d => {
            tNet += d.net; tRcv += (d.rcvd || 0); tBal += (d.bal || 0);
            rmM[d.rm] = (rmM[d.rm] || 0) + d.net;

            h += `<tr>
                <td>${d.date}</td><td><b>${d.client}</b></td><td>${d.reg}</td>
                <td style="color:green; font-weight:700">₹${d.net.toLocaleString()}</td>
                <td style="color:red; font-weight:700">₹${(d.bal || 0).toLocaleString()}</td>
                <td>${d.rm}</td>
                <td>
                    <button onclick="edit('${d.id}')" style="color:blue; border:none; background:none; cursor:pointer;"><i class="fas fa-edit"></i></button>
                    <button onclick="del('${d.id}')" style="color:red; border:none; background:none; cursor:pointer; margin-left:10px;"><i class="fas fa-trash"></i></button>
                </td>
            </tr>`;
        });
        document.getElementById('table-body').innerHTML = h;
        document.getElementById('st-net').innerText = "₹" + tNet.toLocaleString();
        document.getElementById('st-rcv').innerText = "₹" + tRcv.toLocaleString();
        document.getElementById('st-bal').innerText = "₹" + tBal.toLocaleString();

        let rmH = "";
        for(let r in rmM) {
            rmH += `<div style="background:#f1f5f9; padding:10px; border-radius:8px; border-left:4px solid var(--accent);"><b>${r}:</b> ₹${rmM[r].toLocaleString()}</div>`;
        }
        document.getElementById('rm-stats-grid').innerHTML = rmH;
    }

    function edit(id) {
        let d = allData.find(x => x.id === id);
        document.getElementById('f-id').value = id;
        document.getElementById('f-date').value = d.date;
        document.getElementById('f-rm').value = d.rm;
        document.getElementById('f-agent').value = d.agent;
        document.getElementById('f-client').value = d.client;
        document.getElementById('f-reg').value = d.reg;
        document.getElementById('f-comp').value = d.comp;
        document.getElementById('f-od').value = d.od || 0;
        document.getElementById('f-tp').value = d.tp || 0;
        document.getElementById('f-net').value = d.net;
        document.getElementById('f-rcvd').value = d.rcvd || 0;
        document.getElementById('f-bal').value = d.bal || 0;
        showP('entry');
    }

    function del(id) {
        if(confirm("Kya aap ise delete karna chahte hain?")) {
            db.collection("erp_records").doc(id).delete().then(() => {
                db.collection("mis_records").doc(id).delete().catch(() => {});
                loadData();
            });
        }
    }

    function search() {
        let v = document.getElementById('search').value.toLowerCase();
        let f = allData.filter(d => d.client.toLowerCase().includes(v) || d.reg.toLowerCase().includes(v) || d.rm.toLowerCase().includes(v));
        updateUI(f);
    }

    function showP(p) {
        document.querySelectorAll('.page').forEach(e => e.classList.add('hidden'));
        document.getElementById('p-'+p).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    }

    function reset() { 
        document.getElementById('f-id').value = ""; 
        document.querySelectorAll('input').forEach(i => i.value = ""); 
    }

    function exportExcel() {
        const ws = XLSX.utils.json_to_sheet(allData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Business_Records");
        XLSX.writeFile(wb, "RadhaRadha_ERP_Report.xlsx");
    }
</script>
</body>
</html>
