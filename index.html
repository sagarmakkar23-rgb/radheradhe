<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radhe Radhe Insurance CRM</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #d32f2f; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #d32f2f; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #b71c1c; }
        .error { color: red; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="login-card" id="login Section">
    <h2>🙏 राधा राधा Insurance</h2>
    <p>Admin Login</p>
    <input type="email" id="email" placeholder="Email (admin@radheradhe.com)">
    <input type="password" id="password" placeholder="Password (admin@123)">
    <button onclick="login()">Login Karein</button>
    <div id="errorMessage" class="error">Galt details! Dubara koshish karein.</div>
</div>

<script>
    // Aapki Firebase Config yahan fixed hai
    const firebaseConfig = {
        apiKey: "AIzaSyCb4Bd4pGSpJR2SOb6UGEORXb0-O_Ju_M0",
        authDomain: "radhe-radhe-insurance-4d1f8.firebaseapp.com",
        projectId: "radhe-radhe-insurance-4d1f8",
        storageBucket: "radhe-radhe-insurance-4d1f8.firebasestorage.app",
        messagingSenderId: "1025474609753",
        appId: "1:1025474609753:web:24b3156cfff474d2bfe748"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('errorMessage');

        auth.signInWithEmailAndPassword(email, password)
            .then((userCredential) => {
                // Login Success!
                alert("Radhe Radhe! Login Safal Raha.");
                // Yahan aap dashboard ka link daal sakte hain
                window.location.href = "dashboard.html"; 
            })
            .catch((error) => {
                errorDiv.style.display = 'block';
                errorDiv.innerText = "Error: " + error.message;
            });
    }
</script>

</body>
</html>
