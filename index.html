<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🙏 राधा राधा Insurance CRM</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #d32f2f; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; }
        .hidden { display: none !important; }
        
        /* Login Styles */
        #login-container { height: 100vh; display: flex; justify-content: center; align-items: center; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        /* Dashboard Styles */
        #dashboard { padding: 20px; }
        nav { background: var(--primary); color: white; padding: 15px; display: flex; justify-content: space-between; border-radius: 8px; margin-bottom: 20px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .stat-box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: center; }
        table { width: 100%; background: white; margin-top: 20px; border-collapse: collapse; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #f8f9fa; }
    </style>
</head>
<body>

<div id="login-container">
    <div class="card">
        <h2 style="color: var(--primary)">🪈 राधा राधा Insurance</h2>
        <p>Email: admin@radheradhe.com<br>Pass: admin@123</p>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="login()">Login Karein →</button>
        <p id="msg" style="color: red; font-size: 13px; margin-top: 10px;"></p>
    </div>
</div>

<div id="dashboard" class="hidden">
    <nav>
        <span>🙏 Radhe Radhe Insurance CRM</span>
        <button onclick="logout()" style="width: auto; padding: 5px 15px; background: white; color: var(--primary);">Logout</button>
    </nav>
    
    <div class="stats">
        <div class="stat-box"><h3>📄 0</h3><p>Total Policies</p></div>
        <div class="stat-box"><h3>💰 ₹0</h3><p>Net Premium</p></div>
        <div class="stat-box"><h3>👤 0</h3><p>Agents</p></div>
    </div>

    <table>
        <thead>
            <tr><th>Client Name</th><th>Policy No</th><th>Company</th><th>Status</th></tr>
        </thead>
        <tbody id="policyTable">
            <tr><td colspan="4" style="text-align:center">Abhi tak koi data nahi hai.</td></tr>
        </tbody>
    </table>
</div>

<script>
    // Your Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyCb4Bd4pGSpJR2SOb6UGEORXb0-O_Ju_M0",
        authDomain: "radhe-radhe-insurance-4d1f8.firebaseapp.com",
        projectId: "radhe-radhe-insurance-4d1f8",
        storageBucket: "radhe-radhe-insurance-4d1f8.firebasestorage.app",
        messagingSenderId: "1025474609753",
        appId: "1:1025474609753:web:24b3156cfff474d2bfe748"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    function login() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        const m = document.getElementById('msg');

        auth.signInWithEmailAndPassword(e, p)
            .then(() => {
                document.getElementById('login-container').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
            })
            .catch(err => {
                m.innerText = "Error: " + err.message;
            });
    }

    function logout() {
        auth.signOut().then(() => {
            location.reload();
        });
    }

    // Check if user is already logged in
    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('login-container').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
        }
    });
</script>

</body>
</html>
